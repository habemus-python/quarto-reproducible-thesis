title: AGH Thesis (PDF)
version: git-based
quarto-required: ">=1.4.0"

resources:
  - formats/agh-thesis-pdf/logo_AGH.pdf
  - formats/agh-thesis-pdf/partials/titlepage.tex

contributes:
  formats:
    pdf:
      documentclass: report
      papersize: A4
      fontsize: 12pt

      toc: true
      toc-depth: 3
      number-sections: true

      bibliography: refs.bib
      cite-method: biblatex

      include-in-header:
        - text: |
            \usepackage{polski}
            \usepackage[utf8]{inputenc}
            \usepackage[margin=3.5cm]{geometry}
            \usepackage{graphicx}

      include-before-body:
        - formats/agh-thesis-pdf/partials/titlepage.tex

      variables:
        logo: logo_AGH.pdf
