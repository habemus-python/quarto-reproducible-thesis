format:
  pdf:
    documentclass: report
    papersize: A4
    fontsize: 12pt
    toc: true
    toc-depth: 3
    number-sections: true
    bibliography: refs.bib
    cite-method: biblatex
    include-in-header:
      - text: |
          \usepackage{polski}
          \usepackage[utf8]{inputenc}
          \usepackage[margin=3.5cm]{geometry}
          \usepackage{graphicx}
    logo-path: "logo_AGH.pdf"
    include-before-body: partials/titlepage.tex
