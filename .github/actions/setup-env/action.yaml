name: "Setup environment"
description: "Setup Python and dependencies"
inputs:
  token:
    required: true
runs:
  using: "composite"
  steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install Python deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install nbformat nbclient pyyaml
      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install LaTeX, ImageMagick and rsvg (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get install imagemagick
          sudo apt-get update
          sudo apt-get install -y texlive-luatex librsvg2-bin biber texlive-bibtex-extra texlive-latex-recommended texlive-latex-extra texlive-lang-polish

      - name: Install LaTeX and rsvg (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          GITHUB_PAT: ${{ inputs.token }}
        run: |
          quarto install tinytex --no-prompt --update-path
          brew install librsvg

      - name: Install LaTeX & rsvg and point Quarto to correct Python (Windows)
        if: runner.os == 'Windows'
        env:
          GITHUB_PAT: ${{ inputs.token }}
        shell: bash
        run: |
          quarto install tinytex --no-prompt --update-path
          choco install rsvg-convert -y
          echo "QUARTO_PYTHON=python" >> $GITHUB_ENV


