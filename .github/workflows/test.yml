name: test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  render:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install jupyter nbformat nbclient

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Check Quarto
        run: quarto --version

      - name: Install TinyTeX
        run: quarto install tinytex --no-prompt

      - name: Install LaTeX packages (incl. biber)
        run: |
          tlmgr install biblatex biber

      - name: Install rsvg (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin

      - name: Install rsvg (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install librsvg

      - name: Install rsvg (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install rsvg-convert -y

      - name: Test template installation
        run: |
          quarto use template . test-project --no-prompt

      - name: Render example notebook to PDF
        run: |
          quarto render test-project/thesis.ipynb 

      - name: Rename PDF (platform-specific)
        run: | 
          mv test-project/thesis.pdf example-${{ matrix.os }}.pdf 

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with: 
          name: pdf-${{ matrix.os }}
          path: example-${{ matrix.os }}.pdf
