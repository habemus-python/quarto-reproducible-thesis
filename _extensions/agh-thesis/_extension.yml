title: AGH Thesis (PDF)
version: 0.0.0
quarto-required: ">=1.4.0"


contributes:
  formats:
    pdf:
      documentclass: mwart
      papersize: A4
      fontsize: 12pt

      toc: true
      toc-depth: 3
      number-sections: true
      
      cite-method: biblatex
      biblatexoptions:
        - backref=true
        - backend=biber
        - style=authoryear
        - natbib=true
      bibliography: refs.bib

      header-includes: |
        \usepackage{polski}
        \usepackage[utf8]{inputenc}
        \usepackage[margin=3.5cm]{geometry}
        \usepackage{graphicx}
        \usepackage{epigraph}
        \usepackage{xcolor}
        \definecolor{aghgreen}{HTML}{00693C}
        \definecolor{aghblack}{HTML}{1E1E1E}
        \definecolor{aghred}{HTML}{A71930}
        \linespread{1.2}
        \renewcommand*{\bibfont}{\secondarysize}
        \usepackage{etoolbox}
        \apptocmd{\tableofcontents}{\clearpage}{}{}

      colorlinks: true
      linkcolor: aghred
      urlcolor: aghred
      citecolor: aghgreen

      template-partials:
        - "partials/before-body.tex"

      format-resources:
        - logo_AGH.pdf
