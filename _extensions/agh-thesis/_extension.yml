title: AGH Thesis (PDF)
version: 0.0.0
quarto-required: ">=1.4.0"


contributes:
  formats:
    pdf:
      documentclass: report
      papersize: A4
      fontsize: 12pt

      toc: true
      toc-depth: 3
      number-sections: true
      
      cite-method: biblatex
      biblatexoptions:
        - backref=true
        - backend=biber
        - style=authoryear
      bibliography: refs.bib

      linkcolor: black
      urlcolor: black
      citecolor: black
      colorlinks: true

      header-includes: |
        \usepackage{polski}
        \usepackage[utf8]{inputenc}
        \usepackage[margin=3.5cm]{geometry}
        \usepackage{graphicx}

      template-partials:
        - "partials/before-body.tex"

      format-resources:
        - logo_AGH.pdf
